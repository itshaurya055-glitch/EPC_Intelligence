# Nixpacks configuration for EPC Intelligence Core

[phases.setup]
nixPkgs = [
    "python311",     # Python 3.11 interpreter
    "python311Packages.pip",  # pip for installing requirements
    "tesseract",     # Required by pytesseract for OCR
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
